<link rel="stylesheet" href="style.css">
<style>
    .frame {
        position: relative;
        width: 1024px;
        height: 850px;
        border: 1px solid;
        overflow: hidden;
        transform: scale(1);
        background-color: #1F1F26; 
    }

    #momface2 {
        position: absolute;
        top: 100px;
        left: 200px;
        width: 1200px;
    }

    #toptext {
        color: white;
        font-size: 25px;
        text-align: center;
        margin-left: 10px;
        margin-right: 10px;
    }

    #choice1 {
        color: black;
        background-color: white;
        text-decoration: none;
        font-size: 25px;
        text-align: left;
        margin-left: 50px;
        margin-right: 10px;
        position: absolute;
        top: 450px;
    }

    #choice1:hover {
        color: white;
        background-color: black;
        transform: scale(1.3);
        transition: all 250ms ease-in-out;
    }

    #choice2 {
        color: white;
        background-color: black;
        text-decoration: none;
        font-size: 25px;
        text-align: right;
        margin-left: 800px;
        margin-right: 10px;
        position: absolute;
        top: 450px;
    }

    #choice2:hover {
        color: black;
        background-color: white;
        transform: scale(1.3);
        transition: all 250ms ease-in-out;
    }

    #secondtransition {
        color: black;
        background-color: white;
        text-decoration: none;
        font-size: 25px;
        position: absolute;
        top: 800px;
        left: 350px;
    }

    #secondtransition:hover {
        color: white;
        background-color: black;
        transform: scale(1.3);
        transition: all 250ms ease-in-out;
    }
</style>
<div class="frame">
    <p id="toptext">She looked at me with a steady but unsettling smile, her beady eyes glinting with shards of ice. “You don't love me, do you?”</p>
    <img id="momface2" src="momface2.png">
    <a id="choice1" href="foodview.html">“I do...”</a>
    <a id="choice2" onclick="displayChoice2()">“No, I really don't.”</a>
</div>

<script>
    function displayChoice2() {
        document.getElementById("momface2").setAttribute("src", "momface3.png");
        document.getElementById("toptext").innerHTML = "She raised her brows. Perhaps I really surprised her this time. “I never would've treated my own mother the way you do.”";
        document.getElementById("choice1").remove();
        document.getElementById("choice2").remove();
        let secondtransition = document.createElement("a");
        secondtransition.setAttribute("id", "secondtransition");
        secondtransition.setAttribute("href", "peanutgallery.html");
        secondtransition.innerHTML = "I did not appreciate her accusatory tone.";
        let framediv = document.getElementsByClassName("frame")[0];
        framediv.append(secondtransition);
    }
</script>
