<link rel="stylesheet" href="style.css">
<style>
    .frame {
        position: relative;
        width: 1024px;
        height: 850px;
        border: 1px solid;
        overflow: hidden;
        transform: scale(1);
        background-color: #460f18; 
    }

    #sitting {
        position: absolute;
        bottom: 0;
        width: 1024px;
    }

    #text {
        color: white;
        font-size: 25px;
        text-align: center;
        margin-left: 10px;
        margin-right: 10px;
    }

    #next {
        color: black;
        background-color: white;
        text-decoration: none;
        font-size: 25px;
        text-align: left;
        margin-left: 50px;
        margin-right: 10px;
        position: absolute;
        top: 450px;
    }

    #next:hover {
        color: white;
        background-color: black;
        transform: scale(1.3);
        transition: all 250ms ease-in-out;
    }
</style>

<div class="frame">
    <img id="sitting" src="sittingview.png">
    <p id="text">And it was true. How could I be hungry in this place? In this <i>skin</i>?</p>
    <a id="next">My stomach panged as if in protest but my tongue held no cravings so I kept it locked up.</a>
</div>
